[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from   = "/api/queue"
  to     = "/.netlify/functions/queue"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/auth"
  to     = "/.netlify/functions/auth"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/clients"
  to     = "/.netlify/functions/clients"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/analytics"
  to     = "/.netlify/functions/analytics"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/cron"
  to     = "/.netlify/functions/cron"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/cron/reminders"
  to     = "/.netlify/functions/cron-reminders"
  status = 200
  force  = true

[[redirects]]
  from   = "/s/:slug"
  to     = "/s/:slug"
  status = 200
  force  = false

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"